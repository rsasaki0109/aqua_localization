mbes_loop_closure:
  ros__parameters:
    topics:
      points: /aqua_sonar_loc/points_filtered
      keyframe: /aqua_pose_graph/keyframe
      loop_constraint: /aqua_pose_graph/loop_constraint
      status: /mbes_loop_closure/status
      markers: /mbes_loop_closure/markers

    frames:
      map: map

    submaps:
      # Number of accepted sonar points retained per keyframe interval.
      min_points: 300
      max_points: 20000
      # Voxel filtering keeps submap-vs-submap registration tractable.
      voxel_leaf_m: 0.5
      max_submaps: 200

    candidates:
      # Skip recent keyframes so scan-to-scan overlap is not misclassified as loop closure.
      min_keyframe_separation: 20
      # Search only odometry-near historical submaps. Set <= 0 to disable this gate.
      max_distance_m: 15.0
      max_per_keyframe: 5

    registration:
      backend: gicp
      max_iterations: 60
      max_correspondence_distance_m: 3.0
      transformation_epsilon: 1.0e-6
      ndt:
        resolution_m: 1.0
        step_size_m: 0.1
        outlier_ratio: 0.55

    gates:
      max_fitness_score: 2.0
      # Bound how far the registration may move away from the odometry-derived
      # relative transform before the candidate is rejected.
      max_correction_translation_m: 5.0
      max_correction_rotation_rad: 0.5

    loop:
      # Conservative information until calibrated on MBES-SLAM beach_pond.
      translation_sigma_m: 2.0
      rotation_sigma_rad: 0.35
      optimize_after_insert: true
