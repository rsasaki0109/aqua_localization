aqua_sonar_loc:
  ros__parameters:
    topics:
      # Input sonar point cloud from FLS, multibeam sonar, or simulation.
      points: /sonar/points
      # Accepted/preprocessed point cloud stream. Current skeleton republishes accepted clouds.
      filtered_points: /aqua_sonar_loc/points_filtered
      # Future scan-matching odometry output.
      odometry: /aqua_sonar_loc/odometry
      # Lightweight scan matching/preprocessing health diagnostics.
      status: /aqua_sonar_loc/status
    frames:
      map: map
      odom: odom
      base_link: base_link
      sonar: sonar_link
    scan_matching:
      # Current backends: icp, gicp, ndt, noop.
      # gicp uses pcl::GeneralizedIterativeClosestPoint and tends to be more accurate
      # under noisy correspondences but needs at least k_correspondences (~20) points
      # per scan to compute local covariances.
      # ndt uses pcl::NormalDistributionsTransform and tends to be more robust to
      # outliers + sparse overlap, at the cost of needing a sensible voxel
      # resolution per dataset (see scan_matching.ndt.voxel_resolution_m below).
      backend: icp
      # Maximum correspondence distance in meters.
      max_correspondence_distance: 1.0
      # Maximum solver iterations per registration.
      max_iterations: 50
      # Minimum transformation delta for convergence.
      transformation_epsilon: 0.000001
      # Quality gates applied after each ICP run. Values <= 0 disable the gate.
      # max_fitness_score: PCL ICP fitness (mean squared correspondence distance) above
      # this threshold is rejected. Tune per environment; sonar point clouds are noisier
      # than lidar so this is typically loose.
      max_fitness_score: -1.0
      # Reject per-step transforms whose translation magnitude exceeds this in meters.
      # Catches ICP solutions that have jumped to a wrong correspondence basin.
      max_translation_step_m: -1.0
      # Reject per-step transforms whose rotation magnitude exceeds this in radians.
      max_rotation_step_rad: -1.0
      # Scan-to-submap front end. When > 1, the icp/gicp backends match the new fan
      # against the concatenation of the last `submap_size` accepted fans (each kept
      # in the most-recent fan's frame). Useful for multibeam where a single fan is
      # geometrically degenerate. Value 1 keeps the original scan-to-scan behavior.
      submap_size: 1
      # Use the previous registration's transform as the initial guess for the next
      # registration (constant-velocity motion prior). Strongly recommended when
      # submap_size > 1 to avoid the zero-motion feedback loop on geometrically
      # degenerate fans (each new fan starts at where the previous fan ended, not at
      # identity, so the submap is forced to provide along-track structure).
      use_motion_prior: false
      # Knobs specific to the NDT backend (ignored for other backends).
      ndt:
        # Voxel grid resolution in meters. The NDT sweet spot depends on the
        # density of the input cloud — too small and voxels are empty; too
        # large and the Gaussian distribution underfits real structure.
        # ~1 m suits surface-vessel multibeam (~100s of points / fan over
        # 30 m fan width); drop to ~0.2 m for tank/cluttered FLS scenes.
        voxel_resolution_m: 1.0
        # Maximum optimisation step (m) per Newton update.
        step_size_m: 0.1
        # Fraction of correspondences treated as outliers in the cost.
        # Higher = more robust, slower convergence. PCL default is 0.55.
        outlier_ratio: 0.55

      covariance:
        # Estimate the per-fan published pose covariance from the registration's
        # fitness score and inlier count instead of using a hard-coded diagonal.
        # When false, the legacy 0.25 m² / 0.10 rad² diagonal is published so
        # downstream fusion stays bit-compatible. When true, position variance
        # scales as `position_scale * fitness_score / inliers` (clamped to
        # [position_floor_m2, position_cap_m2]) and rotation variance scales as
        # `rotation_scale * fitness_score / (inliers * characteristic_range_m^2)`
        # (clamped similarly). Higher fitness → larger published variance →
        # downstream fusion downweights the registration. Tune the scales per
        # platform once a chi-square consistency check against ground-truth
        # error is available.
        enable_estimation: false
        position_floor_m2: 0.04
        position_scale: 1.0
        position_cap_m2: 25.0
        rotation_floor_rad2: 0.001
        rotation_scale: 1.0
        rotation_cap_rad2: 1.0
        characteristic_range_m: 10.0

    motion_prior:
      # External motion prior that gets staged on the scan matcher as the registration
      # initial guess. Subscribe to a `nav_msgs/Odometry` topic (e.g. the IMU/pressure
      # estimate from `aqua_imu_loc`); on each accepted sonar fan the node interpolates
      # the buffered odometry at the previous and current fan timestamps and computes
      # the relative SE(3) used to bootstrap PCL ICP/GICP. Empty string disables the
      # subscriber and falls back to the `scan_matching.use_motion_prior` constant-
      # velocity prior. Approximation: the relative base_link motion is used directly
      # as the prior in the sonar frame (assumes a small lever-arm rotation between
      # sonar and base_link; refine with a TF lookup if your platform mounts the sonar
      # with a non-identity orientation).
      topic: ""
      # Reject buffered samples that are farther than this many seconds from a fan
      # timestamp. Set well above the IMU/odometry period and below the bag's typical
      # gap so stale samples don't poison registration.
      max_time_diff_s: 0.5
      # Trim the rolling odometry buffer to this many seconds relative to the newest
      # sample. Bound on memory; should comfortably exceed the worst-case fan period.
      buffer_seconds: 10.0

    preprocessing:
      # Require x/y/z numeric fields before scan matching.
      require_xyz: true
      # Reject points outside max_range_m before registration.
      enable_range_filter: true
      # Conservative default for Forward-Looking Sonar and multibeam simulation.
      max_range_m: 80.0
      # Minimum finite in-range points required before publishing to the registration pipeline.
      min_points: 20
