aqua_sonar_loc:
  ros__parameters:
    topics:
      # MBES-SLAM (POS group) public bathymetry bags publish multibeam detections from a
      # Norbit iWBMSh on `/norbit/detections` as `sensor_msgs/msg/PointCloud2`. The bag
      # also carries `/norbit/bathymetric` (norbit_msgs custom type) — we ignore that and
      # only use the standard PointCloud2 fan.
      points: /norbit/detections
      filtered_points: /aqua_sonar_loc/points_filtered
      odometry: /aqua_sonar_loc/odometry
      status: /aqua_sonar_loc/status

    frames:
      map: map
      odom: odom
      base_link: base_link
      # Set by the original ROS 1 driver. Override at launch if a remapped TF is used.
      sonar: norbit

    scan_matching:
      # GICP tolerates the heavy outlier tails on raw multibeam detections better than
      # plain ICP and is the recommended backend for this dataset.
      backend: gicp
      # Surface vessel sweeps the lake-bed at ~5-15 m range; this is a reasonable
      # gate for fan-to-fan correspondences.
      max_correspondence_distance: 1.5
      max_iterations: 80
      transformation_epsilon: 0.000001
      # Loose fitness gate — multibeam point clouds at ~13 Hz contain a lot of
      # noise and drop-outs; we only want to catch outright divergence.
      max_fitness_score: 1.5
      # ~1 m/s surface vessel × 1/13 s ping period ≈ 0.08 m. 0.6 m is a safe upper
      # bound on per-step motion that still rejects runaway ICP solutions.
      max_translation_step_m: 0.6
      # Surface vessel yaw rate stays well under 1 rad/s; a 0.4 rad per-step gate
      # rejects bad correspondences without clipping legitimate turns.
      max_rotation_step_rad: 0.4
      # Submap-mode is supported (`submap_size > 1` plus `use_motion_prior: true`) but
      # is left disabled by default on this dataset because it cannot bootstrap motion
      # purely from sonar: ICP returns ~zero on the degenerate fan geometry, the prior
      # is then ~zero, and the submap stacks on top of itself in a self-confirming loop.
      # Submap-mode becomes useful once an external IMU/DVL motion prior feeds the
      # registration (planned next step). Re-enable when that wiring lands.
      submap_size: 1
      use_motion_prior: false

    motion_prior:
      # Leave disabled by default: the public MBES-SLAM bag does not yet ship a
      # published `aqua_imu_loc` odometry (the bag has a Microstrain IMU but no
      # pressure, so a separate IMU-only `aqua_imu_loc` profile is required). Set
      # this to e.g. `/aqua_imu_loc/odometry` once that profile lands and the IMU
      # node is bringup-launched alongside this sonar node. With a usable prior you
      # can also re-enable submap mode (`scan_matching.submap_size > 1`).
      topic: ""
      max_time_diff_s: 0.5
      buffer_seconds: 10.0

    preprocessing:
      require_xyz: true
      enable_range_filter: true
      # Norbit iWBMSh real-world detections in this dataset typically fall inside 50 m;
      # 60 m keeps the long tail without admitting clear outliers.
      max_range_m: 60.0
      # Each fan has hundreds of beams. Require at least 60 finite in-range points so
      # GICP's 20-point covariance computation is well conditioned.
      min_points: 60
