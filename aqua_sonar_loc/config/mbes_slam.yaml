aqua_sonar_loc:
  ros__parameters:
    topics:
      # MBES-SLAM (POS group) public bathymetry bags publish multibeam detections from a
      # Norbit iWBMSh on `/norbit/detections` as `sensor_msgs/msg/PointCloud2`. The bag
      # also carries `/norbit/bathymetric` (norbit_msgs custom type) — we ignore that and
      # only use the standard PointCloud2 fan.
      points: /norbit/detections
      filtered_points: /aqua_sonar_loc/points_filtered
      odometry: /aqua_sonar_loc/odometry
      status: /aqua_sonar_loc/status

    frames:
      map: map
      odom: odom
      base_link: base_link
      # Set by the original ROS 1 driver. Override at launch if a remapped TF is used.
      sonar: norbit

    scan_matching:
      # GICP tolerates the heavy outlier tails on raw multibeam detections better than
      # plain ICP and is the recommended backend for this dataset.
      backend: gicp
      # Surface vessel sweeps the lake-bed at ~5-15 m range; this is a reasonable
      # gate for fan-to-fan correspondences.
      max_correspondence_distance: 1.5
      max_iterations: 80
      transformation_epsilon: 0.000001
      # Loose fitness gate — multibeam point clouds at ~13 Hz contain a lot of
      # noise and drop-outs; we only want to catch outright divergence.
      # With an IMU motion prior the ICP solution tracks the prior more
      # aggressively and the fitness scores rise, so this is loosened from the
      # previous prior-disabled value of 1.5.
      max_fitness_score: 3.0
      # ~1 m/s surface vessel × 1/13 s ping period ≈ 0.08 m. With an IMU prior
      # the ICP can occasionally land farther; 1.0 m is a good compromise that
      # admits prior-aligned solutions while still rejecting outright runaway.
      max_translation_step_m: 1.0
      # Surface vessel yaw rate stays well under 1 rad/s; a 0.4 rad per-step gate
      # rejects bad correspondences without clipping legitimate turns.
      max_rotation_step_rad: 0.4
      # Submap-mode is supported (`submap_size > 1` plus `use_motion_prior: true`) but
      # is left disabled by default on this dataset because it cannot bootstrap motion
      # purely from sonar: ICP returns ~zero on the degenerate fan geometry, the prior
      # is then ~zero, and the submap stacks on top of itself in a self-confirming loop.
      # Submap-mode becomes useful once an external IMU/DVL motion prior feeds the
      # registration (planned next step). Re-enable when that wiring lands.
      submap_size: 1
      use_motion_prior: false
      covariance:
        # Replace the legacy 0.25 m² / 0.10 rad² hard-coded diagonal with a
        # fitness/inliers-derived diagonal. The scales are intentionally
        # conservative on this dataset because the post-registration fitness
        # score on degenerate single-fan multibeam is not yet calibrated
        # against ground-truth error — we simply trust the relative ordering:
        # high-fitness fans get a larger published variance, so the loose-
        # coupling fusion downweights them.
        enable_estimation: true
        position_floor_m2: 0.10
        position_scale: 1.0
        position_cap_m2: 16.0
        rotation_floor_rad2: 0.005
        rotation_scale: 1.0
        rotation_cap_rad2: 0.5
        # ~10 m sonar stand-off matches the bathymetric range gate.
        characteristic_range_m: 10.0

    motion_prior:
      # Pair this sonar profile with `aqua_imu_loc/config/mbes_slam.yaml` (the
      # IMU-only profile that subscribes to /nav/processed/microstrain/imu/madgwick
      # and emits surface-vessel z=0 pseudo-depth updates). When that node is
      # running alongside this one, /aqua_imu_loc/odometry feeds the registration
      # initial guess and the estimator can actually move on this geometrically
      # degenerate single-fan dataset. If aqua_imu_loc is not running, the buffer
      # stays empty and the matcher silently falls back to the identity prior —
      # equivalent to the previous scan-to-scan behavior.
      topic: /aqua_imu_loc/odometry
      max_time_diff_s: 0.5
      buffer_seconds: 10.0

    preprocessing:
      require_xyz: true
      enable_range_filter: true
      # Norbit iWBMSh real-world detections in this dataset typically fall inside 50 m;
      # 60 m keeps the long tail without admitting clear outliers.
      max_range_m: 60.0
      # Each fan has hundreds of beams. Require at least 60 finite in-range points so
      # GICP's 20-point covariance computation is well conditioned.
      min_points: 60
