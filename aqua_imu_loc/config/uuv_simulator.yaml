aqua_imu_loc:
  ros__parameters:
    topics:
      # Starter topic names for rexrov-style uuv_simulator bags/bridges.
      # Common alternatives include /rexrov/imu/data or /imu/data depending on the bridge.
      imu: /rexrov/imu
      # Expected type: sensor_msgs/msg/FluidPressure in pascals.
      # Some simulations expose depth directly; convert it upstream to FluidPressure for this MVP.
      pressure: /rexrov/pressure
      # Optional geometry_msgs/TwistStamped current estimate in odom frame.
      current_velocity: ""
      odometry: /aqua_imu_loc/odometry
      status: /aqua_imu_loc/status

    frames:
      # Keep stack frame names stable; bridge simulator-specific frames with static TF if needed.
      map: map
      odom: odom
      base_link: base_link

    publish:
      # Top-level aqua_localization launch overrides this automatically when fusion is enabled.
      tf: true
      odometry: true

    services:
      reset: /aqua_imu_loc/reset

    ukf:
      alpha: 0.2
      beta: 2.0
      kappa: 0.0
      # Simulation IMU/pressure are usually cleaner than field bags, but pure IMU horizontal
      # dead reckoning still drifts quickly without DVL or ground truth corrections.
      initial_covariance_diagonal:
        [0.20, 0.20, 0.10,
         0.08, 0.08, 0.05,
         0.03, 0.03, 0.08,
         0.03, 0.03, 0.03,
         0.01, 0.01, 0.01]
      process_noise_diagonal:
        [0.015, 0.015, 0.010,
         0.15, 0.15, 0.08,
         0.008, 0.008, 0.015,
         0.0003, 0.0003, 0.0003,
         0.0001, 0.0001, 0.0001]
      max_prediction_dt: 0.05
      min_prediction_dt: 0.0005

    pressure:
      # Simulated pressure is usually absolute. Use atmospheric reference so initial depth is preserved.
      use_first_pressure_as_reference: false
      reference_pressure_pa: 101325.0
      # Most uuv_simulator worlds model seawater.
      water_density_kg_m3: 1025.0
      # Cleaner than field Bar30 data; keep depth update tight for regression and simulation.
      depth_variance: 0.01
      depth_offset_m: 0.0

    dynamics:
      gravity_mps2: 9.80665
      enable_linear_drag: true
      # Generic small-AUV/ROV damping tune. Match this to the simulated hydrodynamic model later.
      linear_drag_coeff: 0.04
      # Disable by default because simulator buoyancy is already applied in the plant model.
      enable_buoyancy: false
      buoyancy_accel_z_mps2: 0.0
      # Static water-current velocity in odom frame [m/s]. Overwritten by topics.current_velocity.
      current_velocity_xyz: [0.0, 0.0, 0.0]
