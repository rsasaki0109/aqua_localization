aqua_imu_loc:
  ros__parameters:
    topics:
      # High-rate IMU topic. Expected in base_link frame with REP-145-compatible units.
      imu: /imu/data
      # Fluid pressure topic in pascals. Converted to depth and fused as a high-priority z measurement.
      pressure: /pressure
      # Optional geometry_msgs/TwistStamped water-current velocity in odom frame.
      # Leave empty to use only dynamics.current_velocity_xyz from this file.
      current_velocity: ""
      # Published dead-reckoning odometry topic.
      odometry: /aqua_imu_loc/odometry
      # Lightweight estimator health/status diagnostics.
      status: /aqua_imu_loc/status

    frames:
      # Global frame. In pure dead-reckoning mode map->odom is published as identity.
      map: map
      # Local continuous odometry frame.
      odom: odom
      # Robot body frame.
      base_link: base_link

    publish:
      # Publish map->odom and odom->base_link transforms.
      tf: true
      # Publish odometry after every accepted IMU or pressure update.
      odometry: true

    services:
      # Reset UKF state, covariance, IMU timestamp state, status counters, and pressure reference.
      reset: /aqua_imu_loc/reset

    ukf:
      # Sigma point spread. Larger values are often more numerically stable during early tuning.
      alpha: 0.2
      # Optimal for Gaussian prior in the standard UKF formulation.
      beta: 2.0
      # Secondary sigma point spread parameter.
      kappa: 0.0
      # Initial covariance diagonal for:
      # [x, y, z, vx, vy, vz, roll, pitch, yaw, accel_bias_xyz, gyro_bias_xyz]
      initial_covariance_diagonal:
        [0.25, 0.25, 0.25,
         0.10, 0.10, 0.10,
         0.05, 0.05, 0.10,
         0.05, 0.05, 0.05,
         0.01, 0.01, 0.01]
      # Continuous process noise diagonal for the same state order.
      process_noise_diagonal:
        [0.02, 0.02, 0.02,
         0.20, 0.20, 0.20,
         0.01, 0.01, 0.02,
         0.0005, 0.0005, 0.0005,
         0.0001, 0.0001, 0.0001]
      # Ignore or clamp abnormal IMU intervals. Useful during bag seek or startup.
      max_prediction_dt: 0.05
      min_prediction_dt: 0.0005

    pressure:
      # If true, the first pressure sample becomes the zero-depth reference.
      use_first_pressure_as_reference: true
      # Used when use_first_pressure_as_reference is false. Typical sea-level atmospheric pressure is 101325 Pa.
      reference_pressure_pa: 101325.0
      # Seawater density. Fresh water is roughly 997 kg/m^3; seawater is roughly 1025 kg/m^3.
      water_density_kg_m3: 1025.0
      # Measurement variance for depth in m^2.
      depth_variance: 0.04
      # Additive correction after pressure-to-depth conversion. Positive means deeper.
      depth_offset_m: 0.0

    imu:
      # If true, take yaw from sensor_msgs/Imu.orientation as a low-rate measurement update.
      # Useful when MAVROS or another bridge publishes a magnetometer-anchored AHRS quaternion.
      # Disabled by default to keep behavior conservative; enable per-vehicle.
      use_orientation_yaw: false
      orientation_yaw_variance_rad2: 0.05
      orientation_yaw_subsample: 5
      # If true, derive AHRS yaw rate from sensor_msgs/Imu.orientation and use the difference
      # against gyro_z as a soft observation of the gyro_z bias state. This drags the bias
      # toward an AHRS-consistent value without rotating the position state.
      use_ahrs_gyro_bias_z: false
      ahrs_gyro_bias_z_variance_rad2_s2: 1.0e-3
      ahrs_gyro_bias_z_subsample: 10
      ahrs_gyro_bias_z_max_dt_s: 0.5
      # If true, observe all 3 gyro bias states from the AHRS quaternion derivative
      # (body angular velocity computed via small-angle log map between consecutive samples).
      use_ahrs_gyro_bias_xyz: false
      ahrs_gyro_bias_xyz_variance_rad2_s2:
        x: 1.0e-2
        y: 1.0e-2
        z: 1.0e-2
      ahrs_gyro_bias_xyz_subsample: 20
      ahrs_gyro_bias_xyz_max_dt_s: 0.5

    init:
      # Estimate initial gyro bias from a short static window at startup.
      # Aborts automatically if the IMU is moving (gyro magnitude or |accel|-g exceeds thresholds).
      static_bias:
        enable: true
        window_seconds: 3.0
        gyro_motion_threshold_radps: 0.10
        accel_motion_threshold_mps2: 0.50
        minimum_samples: 50

    dynamics:
      # Gravity used by pressure conversion and IMU specific-force integration.
      gravity_mps2: 9.80665
      # Enable a simple relative-water-velocity linear drag acceleration model.
      enable_linear_drag: true
      # Drag coefficient in 1/s. Applied to velocity relative to estimated water current.
      linear_drag_coeff: 0.05
      # Enable a constant vertical acceleration term for buoyancy/ballast mismatch.
      enable_buoyancy: false
      # Positive z is upward in the odom frame.
      buoyancy_accel_z_mps2: 0.0
      # Estimated current velocity in odom frame [m/s]. Later this will be replaced by a state or external input.
      # Used as the initial/default value and overwritten when topics.current_velocity is enabled.
      current_velocity_xyz: [0.0, 0.0, 0.0]
